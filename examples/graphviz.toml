# Example styling for `conduit graph --style examples/graphviz.toml`.
#
# Every key is optional: omitted values fall back to the built-in defaults
# (see `conduit.cli.graph_style.GraphvizSpec`). This file styles the DAG only;
# it is kept separate from the science config so one style can be reused across
# many pipelines.

# Draw the colour legend (default: true).
show_legend = true

# Box nodes into one subgraph cluster per declared frequency, in addition to
# colouring them (default: true). Set false for a flat, un-clustered layout.
cluster_by_frequency = true

# Colours.
#
# Nodes are grouped by their *declared* frequency contract — the `freq` on a
# `[[node]]` or `[[resample]]` ("7D", "1ME", "W-SUN") — not by their name. Since
# frequencies are arbitrary pandas offset aliases rather than a fixed vocabulary,
# colours are assigned automatically from a qualitative cycle in first-seen order.
#
# Name a frequency here to pin its colour, so it stays the same across renders and
# across pipelines. `output` is the border drawn around the requested output nodes.
[palette]
"7D" = "#8da0cb"
"1ME" = "#a6d854"
output = "#e7298a"

# Graphviz graph/node/edge attributes, passed straight through to graphviz.
# See https://graphviz.org/doc/info/attrs.html for the full list.
[graph_attr]
rankdir = "LR"   # "TB" for a top-to-bottom layout

[node_attr]
fontname = "Helvetica"

# Full control: point at your own Hamilton `custom_style_function` as
# "module:function". When set it replaces the built-in frequency styling; unit
# labels and frequency-coloured edges are still applied on top.
# style_function = "my_package.styling:my_style"
