[project]

use_directory_urls = false

site_name = "conduit"
site_description = "An opinionated Hamilton + xarray + pint foundation for geoscientific data pipelines."
site_author = "Joe Marsh Rossney"
site_url = "https://NERC-CEH.github.io/conduit"

repo_name = "NERC-CEH/conduit"
repo_url = "https://github.com/NERC-CEH/conduit"

copyright = "Copyright &copy; 2026 The authors"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
      "getting_started/installation.md",
      "getting_started/quickstart.md",
      "getting_started/concepts.md",
      "getting_started/contributing.md",
  ]},
  { "Usage" = [
      "usage/config.md",
      "usage/api.md",
      "usage/cli.md",
      "usage/data-formats.md",
      "usage/custom-modules.md",
      "usage/troubleshooting.md",
  ]},
  { "Examples" = [
      "examples/getting_started.md",
      "examples/unit_safe_pipelines.md",
  ]},
  { "API Reference" = [
      "api/conduit.cli/index.md",
      "api/conduit.cli/cli.md",
      "api/conduit.cli/graph.md",
      "api/conduit.cli/run.md",
      "api/conduit.cli/version.md",
      "api/conduit.config.md",
      "api/conduit.io.md",
      "api/conduit.transforms.md",
      "api/conduit.dag.driver.md",
      "api/conduit.dag/node.md",
      "api/conduit.dag/contract_check.md",
      "api/conduit.dag/wiring_check.md",
      "api/conduit.dag/caching.md",
      "api/conduit.dag/blocking.md",
      "api/conduit.gridded/spatial.md",
      "api/conduit.gridded/io.md",
      "api/conduit.gridded/cli.md",
      "api/conduit.setup_utils/data_gen/coords.md",
      "api/conduit.setup_utils/data_gen/fallback.md",
      "api/conduit.setup_utils/data_gen/generate.md",
  ]},
]

# Katex
extra_javascript = [
    "_static/js/marimo-button.js",
    "_static/js/katex.js",
    "https://unpkg.com/katex@0/dist/katex.min.js",
    "https://unpkg.com/katex@0/dist/contrib/auto-render.min.js"
]
extra_css = [
    "https://unpkg.com/katex@0/dist/katex.min.css"
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"


# Extensions
# ----------
# https://zensical.org/docs/setup/extensions/

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

# Mkdocstrings
# ------------

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
annotations_path = "brief"
docstring_style = "numpy"
docstring_section_style = "list"
inherited_members = true
line_length = 88
merge_init_into_class = true
separate_signature = true
show_signature = true
signature_crossrefs = true
show_signature_annotations = true
show_if_no_docstring = false
show_root_full_path = true
show_root_heading = true
show_root_members_full_path = false
show_source = false
show_symbol_type_heading = true
show_symbol_type_toc = true

