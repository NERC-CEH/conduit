[models.pmodel]
method_kphio = "sandoval"
method_optchi = "lavergne20_c3"

[models.rothc]
n_years_spinup = 1

[grid]

[inputs.daily]
path = "daily.nc"
vars = [
  "precipitation",
  "sunshine_fraction",
  "temperature",
  "lai",
  "gpp",
]

[inputs.weekly]
path = "weekly.nc"
vars = [
  "co2",
  "fapar",
  "ppfd",
  "pressure",
  "vpd",
]

[inputs.monthly]
path = "monthly.nc"
vars = [
  "dummy_variable",
]

[inputs.static]
path = "static.nc"
vars = [
  "elevation",
  "plant_type",
  "max_soil_moisture",
  "clay_content",
  "soil_depth",
  "organic_carbon_stocks",
  "root_pool_init",
  "leaf_pool_init",
  "stem_pool_init",
]

