# Generic model-free test pipeline. The single derived node stands in for the
# domain models that used to live here: it produces a weekly DataArray
# (`mean_temperature`) from the daily temperature input, exercising
# config-driven node generation, resampling and the [inputs.*] frequency model.
[[node]]
name = "mean_temperature_weekly"
inputs = ["temperature_daily"]
expression = "temperature_daily.resample(time='7D').mean()"

[inputs.daily]
path = "daily.nc"
vars = [
  "temperature",
  "precipitation",
  "humidity",
  "wind_speed",
  "cloud_fraction",
]

[inputs.weekly]
path = "weekly.nc"
vars = [
  "pressure",
  "radiation",
  "albedo",
  "snow_depth",
  "aerosol",
]

[inputs.monthly]
path = "monthly.nc"
vars = [
  "dummy_variable",
]

[inputs.static]
path = "static.nc"
suffix = ""
vars = [
  "elevation",
  "surface_type",
  "roughness",
  "soil_moisture",
  "land_fraction",
]
